<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>2026年ワールドカップ速報ボード</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body data-page="home">
    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark">26</span>
        <span>W杯速報ボード</span>
      </a>
      <nav class="nav" aria-label="メインナビゲーション">
        <a aria-current="page" href="index.html">ホーム</a>
        <a href="standings.html">順位表</a>
        <a href="bracket.html">トーナメント</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div>
          <p class="eyebrow">2026年 FIFAワールドカップ</p>
          <h1>グループ順位、突破状況、トーナメントを自動更新。</h1>
          <p class="hero-text">
            ESPNの公開スコアボードを定期取得し、完了済み・進行中の試合から順位を再計算します。
            表示は60秒ごとに更新されます。
          </p>
          <div class="hero-actions">
            <a class="button primary" href="standings.html">順位表を見る</a>
            <a class="button ghost" href="bracket.html">トーナメントを見る</a>
          </div>
        </div>
        <aside class="status-card">
          <span class="status-dot" id="statusDot"></span>
          <p class="status-label">ライブデータ</p>
          <strong id="lastUpdated">読み込み中</strong>
          <small id="dataSource">ESPNスコアボード</small>
        </aside>
      </section>

      <section class="section tomorrow-section">
        <div class="section-heading">
          <p class="eyebrow">日本時間</p>
          <h2>今後1週間の試合予定</h2>
          <p id="tomorrowDateLabel">読み込み中</p>
        </div>
        <div id="tomorrowSchedule" class="schedule-list" aria-live="polite"></div>
      </section>

    </main>

    <script src="data/app.js"></script>
  </body>
</html>
